<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Plumbing Services | Coming Soon</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c92d2);
            background-size: 400% 400%;
            animation: gradient 12s ease infinite;
            color: white;
            overflow: hidden;
        }

        @keyframes gradient {
            0% {
                background-position: 0% 50%
            }

            50% {
                background-position: 100% 50%
            }

            100% {
                background-position: 0% 50%
            }
        }

        .container {
            width: 90%;
            max-width: 900px;
            padding: 50px;
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .logo {
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .logo span {
            color: #00e5ff;
        }

        h1 {
            font-size: 48px;
            margin: 10px 0;
        }

        .subtitle {
            opacity: .8;
            margin-bottom: 40px;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .box {
            padding: 20px;
            width: 100px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
        }

        .box h2 {
            font-size: 32px;
        }

        .box span {
            font-size: 14px;
            opacity: .7;
        }

        .notify {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .notify input {
            padding: 12px 15px;
            border: none;
            border-radius: 6px;
            width: 220px;
        }

        .notify button {
            background: #00c6ff;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
        }

        .notify button:hover {
            background: #00a6d6;
            transform: translateY(-2px);
        }

        .contact {
            opacity: .8;
            font-size: 14px;
        }

        .whatsapp {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #25D366;
            color: white;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 28px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            text-decoration: none;
        }

        .floating {
            position: absolute;
            opacity: .15;
            font-size: 40px;
            animation: float 10s linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh)
            }

            100% {
                transform: translateY(-100vh)
            }
        }

        .f1 {
            left: 10%;
            animation-duration: 12s;
        }

        .f2 {
            left: 30%;
            animation-duration: 15s;
        }

        .f3 {
            left: 50%;
            animation-duration: 18s;
        }

        .f4 {
            left: 70%;
            animation-duration: 14s;
        }

        .f5 {
            left: 90%;
            animation-duration: 16s;
        }

        @media(max-width:700px) {

            h1 {
                font-size: 32px;
            }

            .countdown {
                flex-wrap: wrap;
            }

            .container {
                padding: 35px;
            }

        }
    </style>
</head>

<body>

    <!-- floating plumbing icons -->

    <div class="floating f1">🚿</div>
    <div class="floating f2">🔧</div>
    <div class="floating f3">🚰</div>
    <div class="floating f4">🛠</div>
    <div class="floating f5">💧</div>

    <div class="container">

        <div class="logo">🔧 My<span>Drain</span> Dr</div>

        <h1>Website Launching Soon</h1>

        <p class="subtitle">
            Professional plumbing solutions are coming to your city.
            Fast service. Expert technicians. Reliable repairs.
        </p>

        <div class="countdown">

            <div class="box">
                <h2 id="days">00</h2>
                <span>Days</span>
            </div>

            <div class="box">
                <h2 id="hours">00</h2>
                <span>Hours</span>
            </div>

            <div class="box">
                <h2 id="minutes">00</h2>
                <span>Minutes</span>
            </div>

            <div class="box">
                <h2 id="seconds">00</h2>
                <span>Seconds</span>
            </div>

        </div>

        <div class="notify">
            <input type="email" placeholder="Enter your email for updates">
            <button>Notify Me</button>
        </div>

        <div class="contact">
            📞 +91 XXXXX XXXXX
            <br>
            📍 Serving your city soon
        </div>

    </div>

    <a class="whatsapp" href="https://wa.me/91XXXXXXXXXX">💬</a>

    <script>

        const launchDate = new Date("May 30, 2026 00:00:00").getTime();

        const timer = setInterval(function () {

            const now = new Date().getTime();
            const distance = launchDate - now;

            const days = Math.floor(distance / (100000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = days;
            document.getElementById("hours").innerHTML = hours;
            document.getElementById("minutes").innerHTML = minutes;
            document.getElementById("seconds").innerHTML = seconds;

            if (distance < 0) {
                clearInterval(timer);
                document.querySelector(".countdown").innerHTML = "We Are Live!";
            }

        }, 1000);

    </script>

</body>

</html>
